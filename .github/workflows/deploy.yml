name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  FRONTEND_DIR: ${{ vars.PROJECT_FRONTEND_DIR || './frontend' }}
  BACKEND_DIR: ${{ vars.PROJECT_BACKEND_DIR || './backend' }}
  PYTHON_VER: ${{ vars.PYTHON_VERSION || '3.11' }}
  NODE_VER: ${{ vars.NODE_VERSION || '20' }}

jobs:
  # 构建前端
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VER }}
          cache: 'pnpm'
          cache-dependency-path: '${{ env.FRONTEND_DIR }}/pnpm-lock.yaml'

      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: pnpm install --frozen-lockfile

      - name: Build for production
        working-directory: ${{ env.FRONTEND_DIR }}
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ${{ env.FRONTEND_DIR }}/dist
          retention-days: 1

  # 构建后端 Docker 镜像
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/template-vue3-django-ninja-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BACKEND_DIR }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 部署到测试环境
  deploy-staging:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend-dist

      - name: Deploy to staging server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST: ${{ vars.STAGING_HOST }}
          STAGING_USER: ${{ vars.STAGING_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $STAGING_HOST >> ~/.ssh/known_hosts

          # 部署前端静态文件
          rsync -avz --delete ./frontend-dist/ $STAGING_USER@$STAGING_HOST:/var/www/staging/static/

          # 部署后端（使用 Docker）
          ssh $STAGING_USER@$STAGING_HOST "
            cd /opt/app &&
            docker-compose -f docker-compose.staging.yml pull &&
            docker-compose -f docker-compose.staging.yml up -d &&
            docker-compose -f docker-compose.staging.yml exec -T backend python manage.py migrate &&
            docker-compose -f docker-compose.staging.yml exec -T backend python manage.py collectstatic --noinput
          "

      - name: Health check
        run: |
          sleep 10
          curl -f https://staging.example.com/api/v1/health || exit 1

  # 部署到生产环境
  deploy-production:
    needs: [build-frontend, build-backend]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://example.com

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend-dist

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Deploy to production server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_KEY }}
          PRODUCTION_HOST: ${{ vars.PRODUCTION_HOST }}
          PRODUCTION_USER: ${{ vars.PRODUCTION_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $PRODUCTION_HOST >> ~/.ssh/known_hosts

          # 备份数据库
          ssh $PRODUCTION_USER@$PRODUCTION_HOST "
            pg_dump -h localhost -U postgres template_db > /backup/db_$(date +%Y%m%d_%H%M%S).sql
          "

          # 部署前端静态文件
          rsync -avz --delete ./frontend-dist/ $PRODUCTION_USER@$PRODUCTION_HOST:/var/www/production/static/

          # 部署后端（使用 Docker，蓝绿部署）
          ssh $PRODUCTION_USER@$PRODUCTION_HOST "
            cd /opt/app &&
            # 拉取新镜像
            docker-compose -f docker-compose.production.yml pull &&
            # 启动新容器（蓝色）
            docker-compose -f docker-compose.production.yml up -d backend-blue &&
            sleep 10 &&
            # 健康检查
            curl -f http://localhost:8001/api/v1/health || exit 1 &&
            # 切换流量到蓝色
            docker-compose -f docker-compose.production.yml exec nginx nginx -s reload &&
            # 停止旧容器（绿色）
            docker-compose -f docker-compose.production.yml stop backend-green &&
            # 执行迁移
            docker-compose -f docker-compose.production.yml exec -T backend-blue python manage.py migrate &&
            docker-compose -f docker-compose.production.yml exec -T backend-blue python manage.py collectstatic --noinput
          "

      - name: Health check
        run: |
          sleep 30
          curl -f https://example.com/api/v1/health || exit 1

      - name: Notify deployment
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ 生产环境部署失败",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*生产环境部署失败*\n版本: ${{ github.ref }}\n提交: ${{ github.sha }}\n作者: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # 清理工作
  cleanup:
    needs: [deploy-staging, deploy-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Delete old artifacts
        uses: geekyeggo/delete-artifact@v4
        with:
          name: frontend-dist
          failOnError: false
