name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 创建发布
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        id: changelog
        run: |
          # 获取上一个标签
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            # 如果没有上一个标签，获取所有提交
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # 获取两个标签之间的提交
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges $PREVIOUS_TAG..HEAD)
          fi
          
          # 按类型分类
          FEATURES=$(echo "$CHANGELOG" | grep -E "^-\s*(feat|feature):" || true)
          FIXES=$(echo "$CHANGELOG" | grep -E "^-\s*(fix|bugfix):" || true)
          PERF=$(echo "$CHANGELOG" | grep -E "^-\s*(perf|performance):" || true)
          DOCS=$(echo "$CHANGELOG" | grep -E "^-\s*(docs|doc):" || true)
          OTHER=$(echo "$CHANGELOG" | grep -vE "^-\s*(feat|feature|fix|bugfix|perf|performance|docs|doc):" || true)
          
          # 构建发布说明
          RELEASE_BODY="## 📝 变更日志

"
          
          if [ -n "$FEATURES" ]; then
            RELEASE_BODY="${RELEASE_BODY}### ✨ 新功能
${FEATURES}

"
          fi
          
          if [ -n "$FIXES" ]; then
            RELEASE_BODY="${RELEASE_BODY}### 🐛 Bug 修复
${FIXES}

"
          fi
          
          if [ -n "$PERF" ]; then
            RELEASE_BODY="${RELEASE_BODY}### ⚡ 性能优化
${PERF}

"
          fi
          
          if [ -n "$DOCS" ]; then
            RELEASE_BODY="${RELEASE_BODY}### 📝 文档更新
${DOCS}

"
          fi
          
          if [ -n "$OTHER" ]; then
            RELEASE_BODY="${RELEASE_BODY}### 🔧 其他变更
${OTHER}

"
          fi
          
          RELEASE_BODY="${RELEASE_BODY}---

**完整变更**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ github.ref_name }}"
          
          # 输出到文件
          echo "$RELEASE_BODY" > RELEASE_BODY.md

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_BODY.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: false

  # 构建并上传产物
  build-assets:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            path: ./frontend/dist
            asset_name: frontend-dist.zip
          - name: backend
            path: ./backend
            asset_name: backend-source.zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        if: matrix.name == 'frontend'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: matrix.name == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: './frontend/pnpm-lock.yaml'

      - name: Build Frontend
        if: matrix.name == 'frontend'
        working-directory: ./frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Zip Assets
        run: |
          cd ${{ matrix.path }}
          zip -r ${{ matrix.asset_name }} .
          mv ${{ matrix.asset_name }} ${{ github.workspace }}/

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.asset_name }}
          asset_name: ${{ matrix.asset_name }}
          asset_content_type: application/zip

  # 更新 Docker 标签
  tag-docker:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          VERSION=${{ github.ref_name }}
          IMAGE=${{ vars.DOCKERHUB_USERNAME }}/template-vue3-django-ninja-backend
          
          # 拉取最新的镜像
          docker pull $IMAGE:latest
          
          # 添加版本标签
          docker tag $IMAGE:latest $IMAGE:$VERSION
          
          # 推送标签
          docker push $IMAGE:$VERSION
          
          # 如果是正式版本，更新 latest 标签
          if [[ $VERSION =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            docker push $IMAGE:latest
          fi

  # 发送通知
  notify:
    needs: [create-release, build-assets, tag-docker]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Slack
        if: vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🎉 新版本发布: ${{ github.ref_name }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🎉 新版本发布"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*版本:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*作者:*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*发布说明:*\n<https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}|查看详情>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Email
        if: vars.NOTIFICATION_EMAIL != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🎉 新版本发布: ${{ github.ref_name }}"
          to: ${{ vars.NOTIFICATION_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <h1>🎉 新版本发布</h1>
            <p><strong>版本:</strong> ${{ github.ref_name }}</p>
            <p><strong>作者:</strong> ${{ github.actor }}</p>
            <p><strong>时间:</strong> ${{ github.event.head_commit.timestamp }}</p>
            <p><a href="https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}">查看发布详情</a></p>
